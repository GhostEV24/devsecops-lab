name: DevSecOps Pipeline

permissions:
  contents: read
  security-events: write

on: [push, pull_request]

jobs:
  # ═══════════════════════════════════════
  # 1. BUILD
  # ═══════════════════════════════════════
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Build Docker image
        run: docker build -t vuln-app:${{ github.sha }} .

      - name: Save image
        run: docker save vuln-app:${{ github.sha }} > image.tar

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: image.tar
          retention-days: 1

  # ═══════════════════════════════════════
  # 2. SAST
  # ═══════════════════════════════════════
  sast:
    name: 🔍 SAST
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten

  # ═══════════════════════════════════════
  # 3. SCA
  # ═══════════════════════════════════════
  sca:
    name: 📦 SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      
      - name: Install dependencies
        working-directory: ./src
        run: npm install
      
      - name: npm audit JSON
        working-directory: ./src
        run: npm audit --json > audit.json || true
      
      - name: npm audit display
        working-directory: ./src
        run: npm audit
      
      - name: Upload audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: npm-audit
          path: src/audit.json

  # ═══════════════════════════════════════
  # 4. SECRET DETECTION
  # ═══════════════════════════════════════
  secrets:
    name: 🔐 Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ═══════════════════════════════════════
  # 5. CONTAINER SCAN
  # ═══════════════════════════════════════
  container-scan:
    name: 🐳 Container Scan
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: docker-image
      
      - name: Load image
        run: docker load < image.tar
      
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: vuln-app:${{ github.sha }}
          format: 'table'
          exit-code: '0'
          severity: 'CRITICAL,HIGH'

    # ═══════════════════════════════════════
  # 6. CODEQL (Advanced)
  # ═══════════════════════════════════════
  codeql:
    name: 🔍 CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript
            build-mode: none
          - language: actions
            build-mode: none
    steps:
      - uses: actions/checkout@v4
      
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
      
      - name: Run manual build steps
        if: matrix.build-mode == 'manual'
        shell: bash
        run: |
          echo "Replace this with your build commands, e.g., npm install"
          exit 1

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"

  # ═══════════════════════════════════════
  # 7. REPORT FINAL
  # ═══════════════════════════════════════
  report:
    name: 📊 Report
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, container-scan, codeql]
    if: always()
    steps:
      - name: Generate Report
        run: |
          echo "## 🔒 Security Scan Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Scan | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SAST | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SCA | ${{ needs.sca.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Secrets | ${{ needs.secrets.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Container | ${{ needs.container-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CodeQL | ${{ needs.codeql.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📋 Download artifacts for detailed reports" >> $GITHUB_STEP_SUMMARY

  # ═══════════════════════════════════════
  # 8. SECURITY GATE
  # ═══════════════════════════════════════
  security-gate:
    name: 🚦 Security Gate
    runs-on: ubuntu-latest
    needs: [sast, sca, secrets, container-scan, codeql]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "🔍 Checking security results..."
          
          SAST="${{ needs.sast.result }}"
          SCA="${{ needs.sca.result }}"
          SECRETS="${{ needs.secrets.result }}"
          CONTAINER="${{ needs.container-scan.result }}"
          CODEQL="${{ needs.codeql.result }}"

          echo "SAST: $SAST"
          echo "SCA: $SCA"
          echo "Secrets: $SECRETS"
          echo "Container: $CONTAINER"
          echo "CodeQL: $CODEQL"

          if [[ "$SAST" == "failure" ]] || \
             [[ "$SCA" == "failure" ]] || \
             [[ "$SECRETS" == "failure" ]] || \
             [[ "$CONTAINER" == "failure" ]] || \
             [[ "$CODEQL" == "failure" ]]; then
            echo "❌ Security Gate FAILED - Critical vulnerabilities found!"
            exit 1
          else
            echo "✅ Security Gate PASSED - No critical vulnerabilities"
          fi